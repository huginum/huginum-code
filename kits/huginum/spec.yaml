# kits/huginum/spec.yaml
schemaVersion: "1"
kind: agent
name: huginum-code
displayName: Huginum Code Base Kit
description: Bun-ready shell sandbox for Huginum development.

agent:
  image: "ghcr.io/huginum/huginum-code-bun:dev"
  persistence: persistent
  entrypoint:
    run: [bash]

environment:
  variables:
    BUN_INSTALL: /home/agent/.bun

network:
  allowedDomains:
    - "bun.sh:443"
    - "registry.npmjs.org:443"
    - "*.npmjs.org:443"
    - "github.com:443"
    - "*.githubusercontent.com:443"
